name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - os: linux
            arch: mipsle
            suffix: linux_mipsle
            goflags: GOOS=linux GOARCH=mipsle GOMIPS=softfloat
          - os: linux
            arch: amd64
            suffix: linux_amd64
            goflags: GOOS=linux GOARCH=amd64
          - os: linux
            arch: arm64
            suffix: linux_arm64
            goflags: GOOS=linux GOARCH=arm64
          - os: windows
            arch: amd64
            suffix: windows_amd64
            goflags: GOOS=windows GOARCH=amd64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Fix go modules
      run: |
        go clean -modcache
        go mod tidy

    - name: Build for ${{ matrix.target.os }}/${{ matrix.target.arch }}
      run: |
        ${{ matrix.target.goflags }} go build -ldflags="-s -w" -o pipet_${{ matrix.target.suffix }}.${{ matrix.target.os == 'windows' && 'exe' || '' }}
        ls -la pipet_*

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pipet_${{ matrix.target.suffix }}
        path: pipet_${{ matrix.target.suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          
          gh release delete "$VERSION" --yes 2>/dev/null || true
          
          gh release create "$VERSION" \
            --title "Development Build $VERSION" \
            --notes "Automatic build from commit ${{ github.sha }}%0A%0A**Platforms:**%0A- Linux amd64%0A- Linux arm64%0A- Linux mipsle (MT7620A)%0A- Windows amd64" \
            --prerelease \
            artifacts/*