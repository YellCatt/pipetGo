name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Fix go modules
      run: |
        go clean -modcache
        go mod tidy

    - name: Build for Windows amd64
      run: |
        go build -ldflags="-s -w" -o pipet_windows_amd64.exe
        dir pipet_*.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pipet_windows_amd64
        path: pipet_windows_amd64.exe